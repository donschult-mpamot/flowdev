name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded PR runs; never cancel mid-flight runs on main (each commit
# on main needs its own completed CI for the merge-status paper trail).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: typecheck / lint / test / build
    runs-on: ubuntu-latest

    # Postgres service mirrors the local flowdev-postgres compose service so
    # integration tests (Story 1.7+) can exercise real DB-level semantics
    # (transactional commit/rollback, table-level REVOKE) instead of mocks.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: flowdev
          POSTGRES_PASSWORD: flowdev
          POSTGRES_DB: flowdev
        ports:
          # Host port 5433 matches local dev (compose uses the same to avoid
          # colliding with a pre-installed Postgres on Windows boxes).
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U flowdev -d flowdev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://flowdev:flowdev@localhost:5433/flowdev?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate --workspace=packages/db

      - name: Run migrations
        run: npm run db:migrate:deploy --workspace=packages/db

      # Build first so packages/*/dist is hydrated. Both Typecheck and Test
      # need it: Typecheck because cross-workspace imports resolve through
      # package.json `types` → dist/index.d.ts (Story 1.7 dist-as-types
      # pattern). Test because vitest resolves runtime imports through
      # package.json `main` → dist/index.js (Story 1.1 review pattern).
      - name: Build
        run: npm run build --workspaces --if-present

      - name: Typecheck
        run: npm run typecheck --workspaces --if-present

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Test
        run: npm run test --workspaces --if-present
