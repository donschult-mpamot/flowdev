name: Deploy

# GATED: this workflow is `workflow_dispatch`-only until Don's ACA infrastructure
# is provisioned (architecture §11 line 750 — Azure Container Apps + ACR + Key
# Vault + Managed Identity). Once those exist, change the trigger to:
#
# on:
#   push:
#     branches: [main]
#
# and remove the `workflow_dispatch` block. The matrix build below already
# handles all three apps and is FlowDesk-pattern compatible.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual deploy run (paper trail)"
        required: false
        type: string

# Serialize deploys — concurrent ACA rollouts race each other and can leave
# replicas flapping mid-rollout. Queue, do not cancel.
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  IMAGE_REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}
  IMAGE_NAME_PREFIX: flowdev

jobs:
  build-and-push:
    name: build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}

    strategy:
      fail-fast: false
      matrix:
        app: [web, worker, jobs]

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile.prod
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-${{ matrix.app }}:${{ github.sha }}
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy to Azure Container Apps
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}

    permissions:
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update apps/web Container App
        run: |
          az containerapp update \
            --name ${{ vars.AZURE_CONTAINERAPP_WEB }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-web:${{ github.sha }}

      - name: Update apps/worker Container App
        run: |
          az containerapp update \
            --name ${{ vars.AZURE_CONTAINERAPP_WORKER }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-worker:${{ github.sha }}

      - name: Update apps/jobs Container App Job image (all 7 jobs share the same image)
        run: |
          set -euo pipefail
          for job in hourly-aggregate daily-aggregate retention-prune cost-data-pull resource-snapshot sarb-fx-pull dek-rewrap-sweep; do
            az containerapp job update \
              --name "${{ vars.AZURE_CONTAINERAPP_JOBS_PREFIX }}-${job}" \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}-jobs:${{ github.sha }}
          done
